name: Release Desktop Builds

# Triggers on version tags (e.g. v1.0.0, v1.0.0-rc.1) and manual dispatch.
# Push a tag with: git tag v1.0.0-rc.1 && git push origin v1.0.0-rc.1
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: boolean

# Required secrets — configure these in Settings → Secrets → Actions:
#
#   TAURI_SIGNING_PRIVATE_KEY          (for updater bundle signing — leave unset if updater is not configured)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD (passphrase for the key above — leave unset if key is unset)
#
# macOS notarization (required for Gatekeeper approval on macOS):
#   APPLE_CERTIFICATE                  (base64-encoded .p12 Developer ID certificate)
#   APPLE_CERTIFICATE_PASSWORD         (passphrase for the .p12)
#   APPLE_SIGNING_IDENTITY             (e.g. "Developer ID Application: ...")
#   APPLE_ID                           (Apple ID email used for notarization)
#   APPLE_TEAM_ID                      (10-character Apple team ID)
#   APPLE_PASSWORD                     (app-specific password for the Apple ID above)
#
# GITHUB_TOKEN is provided automatically by Actions — no setup needed.
#
# See desktop/docs/VERSIONING.md for the release process and steps to generate each secret.

permissions:
  contents: write   # required to create GitHub Releases and upload artifacts

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - run: npm ci
        working-directory: desktop

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: desktop

      - name: Run tests
        run: npm test
        working-directory: desktop

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-label: linux
          - platform: windows-latest
            artifact-label: windows
          - platform: macos-latest
            artifact-label: macos

    runs-on: ${{ matrix.platform }}

    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

    steps:
      - uses: actions/checkout@v7

      # ── Node.js ───────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - run: npm ci
        working-directory: desktop

      # ── Rust ───────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ── Linux system dependencies ────────────────────────────────────────────
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      # ── macOS code signing ─────────────────────────────────────────────
      - name: Import macOS code-signing certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k actions build.keychain
          rm certificate.p12

      # ── Load release notes ─────────────────────────────────────────────
      - name: Load release notes
        id: notes
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          NOTES_FILE="desktop/docs/RELEASE_NOTES_${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            {
              echo 'body<<RELEASE_NOTES_EOF'
              cat "$NOTES_FILE"
              echo 'RELEASE_NOTES_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<RELEASE_NOTES_EOF'
              echo "See the [Changelog](https://github.com/${{ github.repository }}/blob/main/desktop/docs/CHANGELOG.md) for what changed in this release."
              echo 'RELEASE_NOTES_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      # ── macOS notarization credentials ────────────────────────────────
      # Only inject APPLE_ID/TEAM_ID/PASSWORD when all three are present.
      # Passing them as empty strings causes the Tauri CLI (Rust) to see
      # them as defined (Ok("")) and attempt notarization, then fail on
      # team ID validation. Writing them via $GITHUB_ENV only when non-empty
      # keeps them absent from the environment when secrets are unconfigured.
      - name: Configure Apple notarization credentials
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          _APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          if [ -n "$_APPLE_ID" ] && [ -n "$_APPLE_TEAM_ID" ] && [ -n "$_APPLE_PASSWORD" ]; then
            echo "APPLE_ID=$_APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$_APPLE_TEAM_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$_APPLE_PASSWORD" >> "$GITHUB_ENV"
          fi

      # ── Build and release ──────────────────────────────────────────────
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Sentinel ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: ${{ github.event.inputs.draft == 'true' || github.event_name == 'push' }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
