name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check the [roadmap](https://github.com/fakej3/Sentinel/blob/main/desktop/docs/ROADMAP.md)
        and [open issues](https://github.com/fakej3/Sentinel/issues) to see if this is already planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're running into.
      placeholder: "When reviewing multiple timeframes, I have to re-run analysis manually for each one..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: "A batch analysis mode that runs the pipeline across multiple timeframes and shows a comparison view."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Analysis pipeline
        - Technical indicators
        - Market structure detection
        - Confidence scoring
        - Trade plan
        - AI narration (Gemini)
        - UI / dashboard
        - Exchange support
        - Local history
        - CLI / API
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, references, or links that help explain the idea.
