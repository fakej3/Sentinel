<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel</title>
    <script>
      // GitHub Pages SPA redirect: preserve path and query string
      var l = window.location
      l.replace(l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') + '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash)
    </script>
  </head>
  <body></body>
</html>
